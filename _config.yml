# this is only for search engines, it does not appear in the home
# as long as the json variables name and description are provided
title: Eric Reymundo
description: Jekyll microtheme that looks like JSON
baseurl: ""
url: https://ericlikedis.github.io

# this information is shown on the homepage, all fields are optional and
# can be declared either as a single string or as a string array/hash
json:
  name: Eric Reymundo
  description:
    - Hello!
    - This tiny website
    - Looks like json
    - Welcome to my mini profile :)
  cv: assets/ericreymundo-resume.pdf
  profession:
    - Cloud Security Engineer
    - PepsiCo
    - Plano, TX
  contact:
    email: ereymundo2013@gmail.com
  profiles:
    linkedin: https://www.linkedin.com/in/eric-reymundo/
    github: https://github.com/ericlikedis

exclude:
  - LICENSE
  - README.md

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

whitelist:
  - jekyll-sitemap

sass:
  sass_dir: _sass
  style: compressed
  sourcemap: never
